<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Multi-Client WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
        }

        .client {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            display: inline-block;
            vertical-align: top;
        }

        #log1, #log2 {
            white-space: pre-wrap;
            border: 1px solid #ccc;
            padding: 10px;
            height: 200px;
            overflow-y: scroll;
            margin-top: 5px;
        }

        input {
            margin: 3px;
        }
    </style>
</head>
<body>
<h2>Multi-Client WebSocket Test</h2>

<div class="client">
    <h3>Client 1</h3>
    <label>Device ID: <input type="number" id="deviceIdInput1" value="1"></label>
    <label>Name: <input type="text" id="nameInput1" value="test1"></label>
    <button id="sendBtn1">Send</button>
    <div id="log1"></div>
</div>

<div class="client">
    <h3>Client 2</h3>
    <label>Device ID: <input type="number" id="deviceIdInput2" value="2"></label>
    <label>Name: <input type="text" id="nameInput2" value="test2"></label>
    <button id="sendBtn2">Send</button>
    <div id="log2"></div>
</div>

<script>
    function createClient(logDivId, deviceInputId, nameInputId, sendBtnId) {
        const logDiv = document.getElementById(logDivId);

        function log(message) {
            logDiv.textContent += message + "\n";
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        const socket = new WebSocket("ws://localhost:8080/ws");
        const stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            log("✅ Connected: " + frame);

            // subscribe na topic
            stompClient.subscribe("/topic/config-changed", function (message) {
                log("📩 Received message: " + message.body);
            });

            // posielanie dynamických správ
            document.getElementById(sendBtnId).addEventListener("click", () => {
                const deviceId = parseInt(document.getElementById(deviceInputId).value, 10);
                const name = document.getElementById(nameInputId).value;

                const payload = {deviceId: deviceId, name: name};
                stompClient.send("/app/configuration/create", {}, JSON.stringify(payload));
                log("✉️ Sent message: " + JSON.stringify(payload));
            });
        }, function (error) {
            log("❌ Error: " + error);
        });
    }

    // vytvoríme 2 klientov
    createClient("log1", "deviceIdInput1", "nameInput1", "sendBtn1");
    createClient("log2", "deviceIdInput2", "nameInput2", "sendBtn2");
</script>
</body>
</html>
