<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dynamic WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
        }

        #log {
            white-space: pre-wrap;
            border: 1px solid #ccc;
            padding: 10px;
            height: 300px;
            overflow-y: scroll;
            margin-top: 10px;
        }

        input {
            margin: 5px;
        }
    </style>
</head>
<body>
<h2>Dynamic WebSocket Test</h2>

<label>Device ID: <input type="number" id="deviceIdInput" value="1"></label>
<label>Name: <input type="text" id="nameInput" value="test"></label>
<button id="sendBtn">Send</button>

<div id="log"></div>

<script>
    const logDiv = document.getElementById("log");

    function log(message) {
        logDiv.textContent += message + "\n";
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(message);
    }

    // 1️⃣ Pripojenie na WebSocket
    const socket = new WebSocket("ws://localhost:8080/ws");
    const stompClient = Stomp.over(socket);

    stompClient.connect({}, function (frame) {
        log("✅ Connected: " + frame);

        // 2️⃣ Subscribe na topic
        stompClient.subscribe("/topic/config-changed", function (message) {
            log("📩 Received message: " + message.body);
        });

        // 3️⃣ Posielanie dynamických správ
        document.getElementById("sendBtn").addEventListener("click", () => {
            const deviceId = parseInt(document.getElementById("deviceIdInput").value, 10);
            const name = document.getElementById("nameInput").value;

            const payload = {deviceId: deviceId, name: name};
            stompClient.send("/app/configuration/create", {}, JSON.stringify(payload));
            log("✉️ Sent message: " + JSON.stringify(payload));
        });
    }, function (error) {
        log("❌ Error: " + error);
    });
</script>
</body>
</html>
