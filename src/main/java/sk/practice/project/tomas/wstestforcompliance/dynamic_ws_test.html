<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Compliance Report WebSocket Test</title>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <style>
    body { font-family: sans-serif; }
    label { margin-right: 5px; }
    input { margin: 3px; width: 80px; }
    button { margin-left: 5px; }
    #log { white-space: pre-wrap; border: 2px solid #666; padding: 10px; height: 400px; overflow-y: scroll; margin-top: 10px; }
  </style>
</head>
<body>
<h2>Compliance Report WebSocket Test</h2>

<label>Report ID: <input type="number" id="reportIdInput" value="1"></label>
<label>Status: <input type="text" id="statusInput" value="pending"></label>
<label>User ID: <input type="number" id="userIdInput" value="123"></label>
<button id="sendBtn">Send</button>

<h3>Received Messages:</h3>
<div id="log"></div>

<script>
  const logDiv = document.getElementById("log");

  function log(message) {
    const time = new Date().toLocaleTimeString();
    logDiv.textContent += `[${time}] ${message}\n`;
    logDiv.scrollTop = logDiv.scrollHeight;
    console.log(message);
  }

  // 1️⃣ Pripojenie na WebSocket
  const socket = new WebSocket("ws://localhost:8080/ws");
  const stompClient = Stomp.over(socket);

  stompClient.connect({}, function(frame) {
    log("✅ Connected: " + frame);

    // 2️⃣ Subscribe na topic
    stompClient.subscribe("/topic/compliance", function(message) {
      log("📩 Received message: " + message.body);
    });

    // 3️⃣ Posielanie dynamických správ
    document.getElementById("sendBtn").addEventListener("click", () => {
      const reportId = parseInt(document.getElementById("reportIdInput").value, 10);
      const status = document.getElementById("statusInput").value;
      const userId = parseInt(document.getElementById("userIdInput").value, 10);

      const payload = { reportId, status, userId };
      stompClient.send("/app/compliance/create", {}, JSON.stringify(payload));
      log("✉️ Sent message: " + JSON.stringify(payload));
    });

  }, function(error) {
    log("❌ Error: " + error);
  });
</script>
</body>
</html>
